<!DOCTYPE html>
<html>

<head>
<title>Cyber Vidya Attendance Calculator</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="container">

<h1>📚 Cyber Vidya Attendance Calculator</h1>

<p class="info">
<b>Mark your total number of lectures and number of presents from Cyber Vidya</b>
</p>

<select id="subject">

<option value="">Select Subject</option>

<option>Maths</option>
<option>SPD (Theory)</option>
<option>SPD (Lab)</option>
<option>Data Structure (DS)</option>
<option>IoT</option>
<option>Communication Skills</option>
<option>Innovation and Entrepreneurship</option>
<option>Python</option>
<option>DSTL</option>
<option>COLD</option>
<option>Chemistry</option>
<option>Web Designing</option>
<option>Design Thinking</option>
<option>Design and Realization (D&R)</option>
<option>Foreign Language</option>

</select>

<input type="number" id="total" placeholder="Total Lectures Held">

<input type="number" id="present" placeholder="Classes Attended">

<button onclick="calculateAttendance()">Check Attendance</button>

<div id="result"></div>

<div class="progress-container">
<div id="progress-bar"></div>
</div>

</div>

<script src="script.js"></script>

</body>

</html>
